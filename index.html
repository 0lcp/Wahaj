<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>وَهَج | متجر الشموع</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fbf6f1;
      color: #4a3b33;
    }

    header {
      background: linear-gradient(90deg, #6b4f3a, #a07a5a);
      color: white;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 2px;
    }

    .hero {
      text-align: center;
      padding: 70px 20px;
      background: linear-gradient(135deg, #a07a5a, #d6b49a);
      color: white;
    }

    .hero h2 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
    }

    .section-title {
      text-align: center;
      margin: 40px 0 20px;
      font-size: 26px;
      color: #6b4f3a;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(107,79,58,0.15);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
      text-align: center;
    }

    .price {
      color: #a07a5a;
      font-weight: bold;
      margin: 8px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 15px;
      background: #6b4f3a;
      color: white;
      text-decoration: none;
      border-radius: 20px;
      font-size: 14px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #4e3728;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #6b4f3a;
      color: white;
      margin-top: 30px;
    }

    .insta-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
      color: white;
      padding: 12px 18px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<header>
  <h1>وَهَج</h1>
  <nav>متجر الشموع اليدوية 🕯️</nav>
</header>

<section class="hero">
  <h2>نور دافئ من الشموع ✨</h2>
  <p>شموع يدوية بروائح ولمسات فنية مميزة</p>
</section>

<h2 class="section-title">🕯️ شموعنا</h2>

<section class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1602874801006-8d6e8c7d9f9b" alt="">
    <div class="card-content">
      <h3>شمعة فانيلا</h3>
      <div class="price">5$</div>
      <a class="btn" href="https://instagram.com/USERNAME" target="_blank">اطلب الآن</a>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1602524818010-8f8d1a3f8d2d" alt="">
    <div class="card-content">
      <h3>شمعة لافندر</h3>
      <div class="price">6$</div>
      <a class="btn" href="https://instagram.com/USERNAME" target="_blank">اطلب الآن</a>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1616628182505-3c5a8a5f1a2e" alt="">
    <div class="card-content">
      <h3>شمعة ورد</h3>
      <div class="price">7$</div>
      <a class="btn" href="https://instagram.com/USERNAME" target="_blank">اطلب الآن</a>
    </div>
  </div>

</section>

<footer>
  © 2026 وَهج - متجر الشموع اليدوية
</footer>

<a class="insta-btn" href="https://instagram.com/wahajs.candles" target="_blank">
  تابعنا 📸
</a>

</body>
</html>
