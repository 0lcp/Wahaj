<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>وَهَج | متجر الأعمال اليدوية</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fbf6f1;
      color: #4a3b33;
    }

    header {
      background: linear-gradient(90deg, #6b4f3a, #a07a5a);
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 2px;
    }

    nav {
      font-size: 14px;
      opacity: 0.9;
    }

    .hero {
      text-align: center;
      padding: 90px 20px;
      background: linear-gradient(135deg, #a07a5a, #d6b49a);
      color: white;
    }

    .hero h2 {
      font-size: 38px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .btn {
      background: #fff;
      color: #6b4f3a;
      padding: 12px 28px;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #f3e7de;
    }

    .products {
      padding: 60px 20px;
      text-align: center;
    }

    .products h3 {
      margin-bottom: 30px;
      font-size: 28px;
      color: #6b4f3a;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(107,79,58,0.15);
      border: 1px solid #f0e3da;
    }

    .card h4 {
      margin: 10px 0;
      color: #6b4f3a;
    }

    footer {
      background: linear-gradient(90deg, #6b4f3a, #a07a5a);
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <h1>وَهَج</h1>
  <nav>متجر أعمال يدوية</nav>
</header>

<section class="hero">
  <h2>إبداع يُصنع باليد ✨</h2>
  <p>منتجات يدوية بروح دافئة ولمسة فنية</p>
  <a href="#products" class="btn">تسوق الآن</a>
</section>

<section class="products" id="products">
  <h3>منتجاتنا</h3>
  <div class="grid">

    <div class="card">
      <h4>هدايا</h4>
      <p>تصاميم مخصصة بروح فنية</p>
    </div>

    <div class="card">
      <h4>ديكور</h4>
      <p>قطع منزلية أنيقة ودافئة</p>
    </div>

    <div class="card">
      <h4>إكسسوارات</h4>
      <p>تفاصيل صغيرة تصنع فرق كبير</p>
    </div>

  </div>
</section>

<footer>
  © 2026 وَهج - جميع الحقوق محفوظة
</footer>

</body>
</html>
